{% set name = "boring-semantic-layer" %}
{% set version = "0.3.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/boring_semantic_layer-{{ version }}.tar.gz
  sha256: 98ebddb53136015e6893b374e22513168e1cce509658067436377580035668e0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - attrs >=25.3.0
    - ibis-framework >=11.0.0
    - packaging
    - pyyaml >=6.0
    - returns >=0.26.0

test:
  imports:
    - boring_semantic_layer
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/boringdata/boring-semantic-layer
  summary: A boring semantic layer built with ibis
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hb1915
    - boringdata
    - hachej

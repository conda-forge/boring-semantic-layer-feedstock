{% set name = "boring-semantic-layer" %}
{% set version = "0.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/boring_semantic_layer-{{ version }}.tar.gz
  sha256: d4e2a9981f24de22b5a2c23a5c377e1dc45d9abdeb524e530e0b593a4e23d2d5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - attrs >=25.3.0
    - ibis-framework >=11.0.0
    - packaging
    - pyyaml >=6.0
    - returns >=0.26.0

test:
  imports:
    - boring_semantic_layer
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/boringdata/boring-semantic-layer
  summary: A boring semantic layer built with ibis
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hb1915
    - boringdata
    - hachej
